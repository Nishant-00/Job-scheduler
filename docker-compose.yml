services:

  postgres:
    image: postgres:15
    container_name: postgres-job
    environment:
      POSTGRES_DB: job_scheduler
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  scheduler1:
    image: scheduler-app
    container_name: scheduler-1
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    environment:
      INSTANCE_NAME : SCHEDULER-1
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/job_scheduler
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres

  scheduler2:
    image: scheduler-app
    container_name: scheduler-2
    ports:
      - "8081:8080"
    depends_on:
      - postgres

    environment:
      INSTANCE_NAME : SCHEDULER-2
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/job_scheduler
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres


  nginx:
    image: nginx:latest
    container_name: scheduler-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - scheduler1
      - scheduler2

